<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translator Tool - Nawab ZADA HACKER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Lock Overlay Styling */
        #lock-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }
        .lock-box {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #38bdf8;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .unlock-btn {
            background: #25d366; /* WhatsApp Green */
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }
        /* Hidden class */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <div class="lock-box">
            <h2 style="color: #f8fafc; margin-bottom: 10px;">Tool is Locked! 🔒</h2>
            <p style="color: #94a3b8;">Click the button Join My WhatsApp Channel to unlock this tool.</p>
            <a href="https://whatsapp.com/channel/0029VbB47ttDDmFNztpnZf2m" 
               target="_blank" 
               class="unlock-btn" 
               onclick="unlockTool()">
               <i class="fab fa-whatsapp"></i> Unlock Tool
            </a>
        </div>
    </div>

    <div class="container hidden" id="main-tool">
        <header>
            <h1><i class="fas fa-language"></i> Translator Tool</h1>
            <p class="dev-tag">Developer Nawab ZADA HACKER 🙌🦅</p>
        </header>

        <div class="wrapper">
            <div class="text-input">
                <textarea class="from-text" placeholder="Enter text..."></textarea>
                <textarea class="to-text" placeholder="Translation" readonly></textarea>
            </div>
            <ul class="controls">
                <li class="row from"><select></select></li>
                <li class="exchange"><i class="fas fa-exchange-alt"></i></li>
                <li class="row to"><select></select></li>
            </ul>
            <button id="translate-btn">Translate Text</button>
        </div>
    </div>

    <script src="languages.js"></script>
    <script>
        // Unlock Function
        function unlockTool() {
            // Thora delay taakay user channel par chala jaye
            setTimeout(() => {
                document.getElementById('lock-overlay').classList.add('hidden');
                document.getElementById('main-tool').classList.remove('hidden');
            }, 1000);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
